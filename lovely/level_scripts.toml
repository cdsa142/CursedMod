[manifest]
version = "1.0.0"
priority = 0

#add level scripts script
[[patches]]
[patches.copy]
target = "level_scripts.lua"
position = "prepend"
payload = "print(\"loading level scripts\")"
sources = [
    "cursed_levelScripts.lua"
]

#invoke add level scripts
[[patches]]
[patches.pattern]
target = "level_scripts.lua"
pattern = "return level_scripts"
position = "before"
payload = 'addLevelScripts(level_scripts)'
match_indent = true

#individual level script patches
[[patches]]
[patches.pattern]
target = "level_scripts.lua"
pattern = '''
level_scripts["1-1"] = function (game)
    local scores = Scores.new()
'''
position = "after"
payload = '''
print("additional level scripts added")
if game.unlocks.flags["solar_boon"] and scores.crown_data[game.level_data.metadata.name]==2 then
    game.level_data[5].entities[#game.level_data[5].entities+1] = {
        x = 9,
        y = 7,
        type = "solar_morningstar",
        value = 0,
        value_str = "",
    }
end

if game.unlocks.flags["lunar_boon"] and scores.crown_data[game.level_data.metadata.name]==2 then
    game.level_data[5].entities[#game.level_data[5].entities+1] = {
        x = 11,
        y = 7,
        type = "lunar_scimitar",
        value = 0,
        value_str = "",
    }
end
'''
match_indent = true

